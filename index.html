<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe with Hearts & Stars</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe with Hearts & Stars</h1>
        <div class="mode-selection">
            <button id="pvp-btn">Player vs Player</button>
            <button id="pvai-btn">Player vs Bot</button>
        </div>
        <div class="board" id="board" style="display: none;">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <div class="status" id="status">Choose a mode to start!</div>
        <button id="switch-mode-btn" style="display: none;">Switch to Player vs Bot</button>
        <button id="reset-btn" style="display: none;">Reset Game</button>
    </div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="modal-message"></p>
            <button id="close-modal">OK</button>
        </div>
    </div>
    <div id="setup-modal" class="modal">
        <div class="modal-content">
            <h2>Player Setup</h2>
            <div class="player-setup" id="player1-setup">
                <div class="shape-square" id="player1-shape-square" data-shape="heart">♥</div>
                <input type="text" id="player1-name" value="Player 1">
            </div>
            <div class="player-setup" id="player2-setup">
                <div class="shape-square" id="player2-shape-square" data-shape="star">★</div>
                <input type="text" id="player2-name" value="Player 2">
            </div>
            <button id="start-game-btn">Start Game</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
